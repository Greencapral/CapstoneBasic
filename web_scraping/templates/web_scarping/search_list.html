{% extends 'web_scarping/base.html' %}

{% block body %}
<div class="container mt-5">
    <h2>История поисковых запросов</h2>

    <div class="row">
        <div class="col-md-12">
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>Пользователь</th>
                        <th>Поисковый запрос</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody>
                    {% for search in searchers %}
                    <tr>
                        <td>{{ search.user.username }}</td>
                        <td>{{ search.query }}</td>
                        <td>
                            <a href="{% url 'search_results' search.query %}"
                               class="btn btn-primary btn-sm">
                                <i class="fas fa-search"></i> Показать результаты
                            </a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center">
                            Записей не найдено
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
