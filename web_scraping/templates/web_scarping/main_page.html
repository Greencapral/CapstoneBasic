{% extends 'web_scarping/base.html' %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">

    <title>Поиск товаров</title>

</head>
<body>
    {% block body %}
        <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
        }

        /* Стили для фиксированного меню */
        .navbar {
            position: sticky;
            top: 0;
            background-color: #007bff;
            padding: 15px 0;
            width: 100%;
            z-index: 1000;
        }

        .navbar-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .navbar a {
            color: white;
            text-decoration: none;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .logout-form {
            display: flex;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto 20px;
            padding: 20px;
        }

        .search-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 400px;
            margin: 20px auto;
        }

        h2 {
            margin-bottom: 30px;
            text-align: center;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            color: #555;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .checkbox-group {
            margin-bottom: 20px;
        }

        .checkbox-group label {
            display: inline-block;
            margin-right: 20px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error {
            color: red;
            font-size: 14px;
        }
    </style>

    <div class="search-container">
        <h2>Поиск товаров</h2>

        <form action="{% url 'query_list' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="search">Что ищем:</label>
                <input type="text" id="search" name="query" required>
            </div>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" id="wb" name="marketplaces[]" value="wildberries.ru">
                    Wildberries
                </label>
                <label>
                    <input type="checkbox" id="ozon" name="marketplaces[]" value="ozon.ru">
                    Ozon
                </label>
            </div>

            <button type="submit">Найти</button>
        </form>
    </div>
{% endblock %}
</body>



</html>
