# Конфигурация Docker Compose для запуска приложения и базы данных
# Описывает сервисы: myapp (веб‑приложение), pg (PostgreSQL), Redis, Celery Worker и Selenium

services:
  # Сервис веб‑приложения
  myapp:
    # Настройки сборки образа
    build:
      # Контекст сборки — текущая директория (где расположен docker-compose.yml)
      context: ./
      # Путь к Dockerfile относительно контекста сборки
      dockerfile: docker-build/app/Dockerfile

    # Переменные окружения для приложения
    environment:
      ENVIRONMENT: docker
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_HOST: "${POSTGRES_HOST}"
      SECRET_KEY: "${SECRET_KEY}"
      REDIS_HOST: "redis_docker"
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      SELENIUM_HOST: "selenium"
      SELENIUM_PORT: "4444"
      SERVICE_TYPE: "web"  # Тип сервиса для entrypoint.sh

    # Команда запуска приложения внутри контейнера
    command: ["/bin/sh", "/etc/entrypoint.sh"]

    # Проброс портов: внешний порт 8000 → внутренний порт 8000 контейнера
    ports:
      - "8000:8000"

    # Условие запуска: сервис myapp стартует только после того, как pg станет «здоровым»
    depends_on:
      pg:
        condition: service_healthy  # Ждём, пока pg пройдёт healthcheck
      redis:
        condition: service_healthy
      selenium:
        condition: service_started

    volumes:
      - ./fixtures:/app/fixtures


  # Сервис базы данных PostgreSQL
  pg:
    # Используем готовый образ PostgreSQL 14 на базе Alpine Linux
    image: postgres:14-trixie

    # Переменные окружения для настройки PostgreSQL
    environment:
      ENVIRONMENT: docker
      # Имя базы данных — берётся из переменной окружения хоста (${PG_DB})
      POSTGRES_DB: ${POSTGRES_DB}
      # Пользователь базы данных — берётся из переменной окружения хоста (${PG_USER})
      POSTGRES_USER: ${POSTGRES_USER}
      # Пароль пользователя — берётся из переменной окружения хоста (${PG_PASSWORD})
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Директория для хранения данных PostgreSQL внутри контейнера
      PGDATA: /var/lib/postgresql/18/docker

    # Проброс портов: внешний порт 5432 → внутренний порт 5432
    # Позволяет подключаться к БД извне (например, через psql или GUI‑клиент)
    ports:
      - "5432:5432"

    # Монтирование тома для сохранения данных БД между перезапусками контейнеров
    volumes:
      - pg-data:/var/lib/postgresql/data  # Данные хранятся в томе pg-data

    # Проверка работоспособности сервиса (healthcheck)
    healthcheck:
      # Команда для проверки: pg_isready проверяет готовность PostgreSQL
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s    # Проверяем каждые 1 секунду
      timeout: 2s   # Таймаут ожидания ответа — 1 секунда
      retries: 3    # Количество попыток перед признанием сервиса нерабочим


  # Сервис Redis для Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3


  # Сервис Celery Worker
  celery-worker:
    build:
      context: ./
      dockerfile: docker-build/app/Dockerfile

    command: [ "/bin/sh", "/etc/entrypoint.sh" ]

    environment:
      ENVIRONMENT: docker
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_HOST: "${POSTGRES_HOST}"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      SERVICE_TYPE: "celery-worker"

    depends_on:
      redis:
        condition: service_healthy
      pg:
        condition: service_healthy

    volumes:
      - ./fixtures:/app/fixtures




  # Сервис Selenium для автоматизации браузера
  selenium:
    image: selenium/standalone-chrome:latest
    shm_size: 2gb
    ports:
      - "4444:4444"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 5s
      retries: 5



# Определение тома для хранения данных PostgreSQL и Redis
# Тома создаются Docker и сохраняются между перезапусками контейнеров
volumes:
  pg-data:
  redis-data:
