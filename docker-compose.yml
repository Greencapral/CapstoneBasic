# docker-compose.yml
# Основная конфигурация сервисов приложения

services:

  # --- Web приложение ---
  myapp:
    # Сборка образа
    build:
      context: ./  # Корень проекта
      dockerfile: docker-build/app/Dockerfile  # Dockerfile приложения

    # Переменные окружения приложения
    environment:
      ENVIRONMENT: docker
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_HOST: "${POSTGRES_HOST}"
      SECRET_KEY: "${SECRET_KEY}"
      REDIS_HOST: "redis_docker"
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      SELENIUM_HOST: "selenium"
      SELENIUM_PORT: "4444"
      SERVICE_TYPE: "web"  # Тип сервиса (используется в entrypoint)

    # Точка входа контейнера
    command: ["/bin/sh", "/etc/entrypoint.sh"]

    # Проброс портов (host:container)
    ports:
      - "8000:8000"

    # Зависимости от сервисов
    depends_on:
      pg:
        condition: service_healthy  # Ждём готовность БД
      redis:
        condition: service_healthy  # Ждём готовность Redis
      selenium:
        condition: service_started  # Достаточно запуска

    # Монтирование данных
    volumes:
      - ./fixtures:/app/fixtures


  # --- PostgreSQL ---
  pg:
    image: postgres:14-trixie  # Готовый образ PostgreSQL

    # Конфигурация БД
    environment:
      ENVIRONMENT: docker
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker  # Каталог данных

    ports:
      - "5432:5432"  # Доступ к БД извне

    # Хранение данных
    volumes:
      - pg-data:/var/lib/postgresql/data

    # Проверка готовности БД
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 2s
      retries: 3


  # --- Redis ---
  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    # Включаем persistence
    command: redis-server --appendonly yes

    # Проверка доступности Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3


  # --- Celery Worker ---
  celery-worker:
    build:
      context: ./
      dockerfile: docker-build/app/Dockerfile

    command: ["/bin/sh", "/etc/entrypoint.sh"]

    # Переменные окружения воркера
    environment:
      ENVIRONMENT: docker
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_HOST: "${POSTGRES_HOST}"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      SERVICE_TYPE: "celery-worker"

    # Зависимости
    depends_on:
      redis:
        condition: service_healthy
      pg:
        condition: service_healthy

    volumes:
      - ./fixtures:/app/fixtures


  # --- Selenium (браузер для тестов) ---
  selenium:
    image: selenium/standalone-chrome:latest
    shm_size: 2gb  # Увеличенная shared memory (важно для Chrome)

    ports:
      - "4444:4444"

    # Проверка готовности Selenium
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 5s
      retries: 5


# --- Томa ---
volumes:
  pg-data:     # Данные PostgreSQL
  redis-data:  # Данные Redis